<circle cx="76" cy="672" r="3" fill="#9a7aa1" opacity="0.13"/>

<!-- Large decorative quote mark -->
<text x="76" y="510" font-family="Georgia, serif" font-size="180" fill="#e09773" opacity="0.1">"</text>

<!-- Eyebrow -->
<text x="120" y="380" font-family="sans-serif" font-size="11" font-weight="600" fill="#b57558" letter-spacing="3">A NOTE FROM YOUR CHIEF PEOPLE OFFICER</text>
<line x1="120" y1="392" x2="500" y2="392" stroke="#dac8b3" stroke-width="0.8"/>

<!-- Quote text -->
<text x="120" y="432" font-family="Georgia, serif" font-size="20" font-style="italic" fill="#3d3530">"This portal exists because you do. Every resource, every form, every tool on this page</text>
<text x="120" y="462" font-family="Georgia, serif" font-size="20" font-style="italic" fill="#3d3530">was built with one person in mind — you. At AMX, our people aren't a department.</text>
<text x="120" y="508" font-family="Georgia, serif" font-size="20" font-style="italic" fill="#3d3530">They're the whole point. I built this space so you always know where to go,</text>
<text x="120" y="538" font-family="Georgia, serif" font-size="20" font-style="italic" fill="#6b4f3a">what you're worth, and that someone in this building is fighting for your experience</text>
<text x="120" y="568" font-family="Georgia, serif" font-size="20" font-style="italic" fill="#6b4f3a">every single day.</text>

<!-- Welcome home -->
<text x="120" y="612" font-family="Georgia, serif" font-size="22" font-weight="700" font-style="italic" fill="#e09773">Welcome home."</text>

<!-- Closing quote -->
<text x="1100" y="638" font-family="Georgia, serif" font-size="80" fill="#e09773" opacity="0.18">"</text>

<!-- Signature -->
<line x1="120" y1="636" x2="560" y2="636" stroke="#dac8b3" stroke-width="0.5"/>
<circle cx="148" cy="673" r="26" fill="#e09773"/>
<text x="148" y="680" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#3d3530">NE</text>
<text x="186" y="666" font-family="Georgia, serif" font-size="17" font-weight="700" fill="#3d3530">Nina Eiland</text>
<text x="186" y="688" font-family="sans-serif" font-size="12" fill="#9c8c82">Chief People Officer · AMX Companies · 334-814-5024</text>

</svg>
