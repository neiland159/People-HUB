<!-- Main headline -->
<text x="142" y="185" font-family="Georgia, serif" font-size="58" font-weight="700" fill="white">Where </text>
<text x="342" y="185" font-family="Georgia, serif" font-size="58" font-weight="700" font-style="italic" fill="#ead9c8">People</text>
<text x="568" y="185" font-family="Georgia, serif" font-size="58" font-weight="700" fill="white"> Come First.</text>

<!-- Sub -->
<text x="142" y="222" font-family="sans-serif" font-size="15" fill="rgba(255,255,255,0.5)">Benefits · 401(k) · HR Forms · Recognition · Events · Well-Being · Learning</text>

<!-- Click anywhere prompt (no fake button) -->
<text x="142" y="272" font-family="sans-serif" font-size="13" font-weight="500" fill="rgba(255,255,255,0.35)">Click anywhere to enter →</text>

<!-- Right decorative circles -->
<circle cx="980" cy="130" r="70" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
